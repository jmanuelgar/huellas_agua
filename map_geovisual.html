   <style>

    #map {
      display: inline-block;
      width: 100%;
      height: 100%;
    }
    /* popup style */
    .ol-popup {
      max-width:300px;
      min-width:100px;
      min-height:1em;
      color: black;
    }
    /* Image on popup */
    .ol-popup img {
      float: left;
      margin: 0.5em 1em 0.5em 1em;
      max-width: 300px;
      max-height: 180px;
    }
    /* no image content tooltips */
    .ol-popup.tooltips img {
      display:none;
    }
    /* Custom red style (tips) */
    .ol-popup.red > div {
      background-color: red;
    }
    .ol-popup.red .anchor {
      color: red;
    }

    /* Custom orange style (tips) */
    .ol-popup.tips.orange > div {
      border-color:#da7;
      background-color:#eca;
    }
    .ol-popup.tips.orange .anchor {
      color: #da7;
    }

    /* orange style (default) */
    .ol-popup.default.orange > div {
      border:4px solid #f96;
    }
    .ol-popup.default.orange .anchor {
      margin: -10px 22px;
    }
    .ol-popup.default.orange .anchor::after {
      margin: 5px -11px; 
    }
    .ol-popup-middle.default.orange .anchor::after {
      margin: -10.5px -27px /*border:4 +2 px */; 
    }
    .ol-popup.default.orange .anchor {
      color: #f96;
    }
    .ol-popup.default.orange .closeBox {
      background-color: rgba(255, 153, 102, 0.7);
    }
    .ol-popup.default.orange .closeBox:hover {
      background-color: rgba(255, 153, 102, 1);
    }

 position: absolute;

  <!-- Bootstrap core JavaScript -->
  <script src="../vendor/jquery/jquery.min.js"></script>

    <script>


  // Popup overlay
  var popup = new ol.Overlay.Popup ({
    popupClass: "black", //"tooltips", "warning" "black" "default", "tips", "shadow",
    closeBox: true,
    positioning: 'auto',
    autoPan: {
      animation: { duration: 250 }
    }
  });

  var popup2 = new ol.Overlay.Popup ({
    popupClass: "default", //"tooltips", "warning" "black" "default", "tips", "shadow",
    closeBox: true,
    positioning: 'auto',
    autoPan: {
      animation: { duration: 250 }
    }
  });


      var raster = new ol.layer.Tile({
        title: "RASTER",
        baseLayer: true,
        source: new ol.source.XYZ({
          attributions: 'Tiles © <a href="https://services.arcgisonline.com/ArcGIS/' +
              'rest/services/World_Topo_Map/MapServer">ArcGIS</a>',
          url: 'https://server.arcgisonline.com/ArcGIS/rest/services/' +
              'World_Topo_Map/MapServer/tile/{z}/{y}/{x}'
        }),
        visible: true
      });

    var aerialLayer = new ol.layer.Tile({
  source: new ol.source.XYZ({
    url: 'https://api.maptiler.com/maps/satellite/{z}/{x}/{y}.jpg?key=BMXepazATydXoRPpapuv',
    tileSize: 512,
    maxZoom: 25,
  }),
  visible: false
})

    var osm = new ol.layer.Tile({
    title: "OSM",
    baseLayer: true,
    source: new ol.source.OSM(),
    visible: false
  });
    var corrientes = new ol.layer.Vector({
      name: 'Corrientes',
    source: new ol.source.Vector({
        url: 'data/corrientes.geojson',
        format: new ol.format.GeoJSON(),
    }),
    visible: false
    });

        var cauces = new ol.layer.Vector({
      name: 'Cauces principales',
    source: new ol.source.Vector({
        url: 'data/cauces_principales.geojson',
        format: new ol.format.GeoJSON(),
    }),
    visible: true
    });

        var tuneles = new ol.layer.Vector({
      name: 'Tuneles',
    source: new ol.source.Vector({
        url: 'data/tuneles.geojson',
        format: new ol.format.GeoJSON(),
    }),
    visible: true
    });

    var muns = new ol.layer.Vector({
      name: 'Municipios',
    source: new ol.source.Vector({
        url: 'data/muns.geojson',
        format: new ol.format.GeoJSON(),
    }),
        visible: false
    }); 

    var cuencas = new ol.layer.Vector({
      name: 'Cuencas',
    source: new ol.source.Vector({
        url: 'data/cuencas.geojson',
        format: new ol.format.GeoJSON(),
    }),
        visible: false
    });

    var cuerpos_agua = new ol.layer.Vector({
      name: 'Cuerpos de agua',
    source: new ol.source.Vector({
        url: 'data/cuerpos_agua.geojson',
        format: new ol.format.GeoJSON(),
    }),
        visible: false
    });

    var desvia_combi = new ol.layer.Vector({
      name: 'Desviación combinada',
    source: new ol.source.Vector({
        url: 'data/desviacion_combinada.geojson',
        format: new ol.format.GeoJSON(),
    }),
        visible: false
    });

    var lumbreras = new ol.layer.Vector({
      name: 'Lumbreras',
    source: new ol.source.Vector({
        url: 'data/lumbreras.geojson',
        format: new ol.format.GeoJSON(),
    }),
        visible: false
    });

    var plantas_bombeo = new ol.layer.Vector({
      name: 'Plantas de bombeo',
    source: new ol.source.Vector({
        url: 'data/plantas_bombeo.geojson',
        format: new ol.format.GeoJSON(),
    }),
        visible: false
    });

    var presas = new ol.layer.Vector({
      name: 'Presas',
    source: new ol.source.Vector({
        url: 'data/presas.geojson',
        format: new ol.format.GeoJSON(),
    }),
        visible: false
    });

    var historias = new ol.layer.Vector({
      name: 'Historias',
    source: new ol.source.Vector({
        url: 'data/historias.geojson',
        format: new ol.format.GeoJSON(),
    }),
        visible: true
    });
    
          var image = new ol.style.Style({
        image: new ol.style.Icon(/** @type {olx.style.IconOptions} */ ({
          anchor: [0.5, 46],
          scale: [0.04], 
          anchorXUnits: 'fraction',
          anchorYUnits: 'pixels',
          src: 'img_map/house.png'
        }))
      });

      historias.setStyle(image);

var StyleCuencas =  new ol.style.Style({
      stroke: new ol.style.Stroke({
     color: [255, 255,255],
      width: 1, 
      lineCap: 'round'
    }),
    fill: new ol.style.Fill({
      color: [ 61, 141, 163, 0.2]
    }) 
});
      cuencas.setStyle(StyleCuencas);

var StyleMuns =  new ol.style.Style({
      stroke: new ol.style.Stroke({
     color: [255, 255,255],
      width: 1, 
      lineCap: 'round'
    }),
    fill: new ol.style.Fill({
      color: [ 64, 58, 58, 0.2]
    }) 
});

    muns.setStyle(StyleMuns);

var Stylecuerpos =  new ol.style.Style({
      stroke: new ol.style.Stroke({
     color: [75, 185, 242],
      width: 0.6, 
      lineCap: 'round'
    }),
    fill: new ol.style.Fill({
      color: [ 75, 185, 242, 0.3]
    }) 
});

    cuerpos_agua.setStyle(Stylecuerpos);

          var imgpresas = new ol.style.Style({
        image: new ol.style.Icon(/** @type {olx.style.IconOptions} */ ({
          anchor: [0.5, 46],
          scale: [0.05], 
          anchorXUnits: 'fraction',
          anchorYUnits: 'pixels',
          src: 'img_map/dam.png'
        }))
      });

    presas.setStyle(imgpresas);

var Stylecorrientes =  new ol.style.Style({
      stroke: new ol.style.Stroke({
     color: [135, 196, 250],
      width: 1.2, 
      lineCap: 'round'
    })
});

    corrientes.setStyle(Stylecorrientes);

    var Stylecauces =  new ol.style.Style({
      stroke: new ol.style.Stroke({
     color: [78, 199, 36],  
      width: 1.2, 
      lineCap: 'round'
    })
});

    cauces.setStyle(Stylecauces);

    var Styletuneles =  new ol.style.Style({
      stroke: new ol.style.Stroke({
     color: [0, 0, 0],
      width: 1.2, 
      lineCap: 'round'
    })
});

      tuneles.setStyle(Styletuneles);


          var imgbombeo = new ol.style.Style({
        image: new ol.style.Icon(/** @type {olx.style.IconOptions} */ ({
          anchor: [0.5, 46],
          scale: [0.06], 
          anchorXUnits: 'fraction',
          anchorYUnits: 'pixels',
          src: 'img_map/water-pump.png'
        }))
      });

      plantas_bombeo.setStyle(imgbombeo);

    var Styledercom =  new ol.style.Style({
      stroke: new ol.style.Stroke({
     color: [130, 93, 217],
      width: 1.2, 
      lineCap: 'round'
    })
});

    desvia_combi.setStyle(Styledercom);

          var imglumbrera = new ol.style.Style({
        image: new ol.style.Icon(/** @type {olx.style.IconOptions} */ ({
          anchor: [0.5, 46],
          scale: [0.03], 
          anchorXUnits: 'fraction',
          anchorYUnits: 'pixels',
          src: 'img_map/water-gate.png'
        }))
      });

      lumbreras.setStyle(imglumbrera);

      var map = new ol.Map({
        layers: [ aerialLayer,raster,osm, cuencas, cuerpos_agua, muns, desvia_combi,cauces, corrientes, tuneles, lumbreras, presas,
         plantas_bombeo, historias],
        target: 'map',
        controls: ol.control.defaults({
          attributionOptions: {
            collapsible: false
          }
        }),
        view: new ol.View({
          center: ol.proj.fromLonLat([-99.1004437,19.6519164]),
          zoom: 10.2
        })
      });
        //map.addControl(new ol.control.LayerPopup());

 // Select  interaction
  var select = new ol.interaction.Select({
    hitTolerance: 5,
    multi: true,
    condition: ol.events.condition.singleClick
  });
  map.addInteraction(select);

  // Select control
  var popup = new ol.Overlay.PopupFeature({
    popupClass: 'default anim',
    select: select,
    canFix: true,
    template: {
        attributes: // [ 'region', 'arrond', 'cantons', 'communes', 'pop' ]
        {
          'cuenca': { title: 'Nombre: '},
          'nomgeo': { title: 'Nombre: '},
          'Nombre': { title: 'Nombre: '},
          'Tipo': { title: 'Tipo: '},
          'Túnel': { title: 'Túnel: '},
          'Elev': { title: 'Altitud (m): '},
          'Seccion': { title: 'Sección: '},
          'RESPONSABL': { title: 'Autoridad responsable: '},
          'Autoridad': { title: 'Autoridad responsable: '},
          'Responsable': { title: 'Autoridad responsable: '},
          'Profund': { title: 'Profundidad (m): '},
          'Profundida': { title: 'Profundidad: '},
          'Longitud_km': { title: 'Longitud (km): '},
          'Diametro_m': { title: 'Diámetro (m): '},
          'Longitud': { title: 'Longitud (km): '},
          'Diametro': { title: 'Diámetro (m): '},
          'Construccion_Inicio': { title: 'Fecha de inicio de construcción: '},
          'Construccion_fin': { title: 'Fecha de fin de construcción: '},
          'Capacidad': { title: 'Capacidad (m3/s): '},
          'Capacidad (hm3)': { title: 'Capacidad (hm3): '},
          'ESTADO': { title: 'Estado: '},
          'Estado': { title: 'Estado: '},
          'DELEGACION': { title: 'Alcaldía o municipio: '},
          'Municipio': { title: 'Alcaldía o municipio: '},
          'PROPOSITO': { title: 'Propósito: '},
          'CORRIENTE': { title: 'Corriente: '},
          'ALT_MAX_CO': { title: 'Altura máxima (m): '},
          'VOL_NAMO': { title: 'Nivel de Aguas Máximas Ordinarias (hm): '},
          'Recibe_de': { title: 'Recibe de: '},
          'Descarga_a': { title: 'Descarga a: '},
          'Descrip': { title: 'Descripción: '},

        }
    }
  });
  map.addOverlay (popup);


   var hover = new ol.interaction.Hover({ layers: [historias, tuneles, cuencas, muns, presas, cauces, plantas_bombeo, desvia_combi, lumbreras, cuerpos_agua], cursor: "pointer" });
    map.addInteraction(hover);

    </script>

    <script>
        $("#boton_leyenda").click(function(){
            $("#control_capas").animate({ 
                      width: "toggle"
               });
           $("#boton_leyenda").hide();
      });
      
      $("#leyend").click(function(){
         $("#control_capas").animate({ 
                width: "toggle"
         });
         $("#boton_leyenda").show();
        });

        $("#pres").click(function(){
            $("#panel_info").animate({ 
                   width: "toggle"
            });
            $("#boton_pres").show();
           });
           
           $("#boton_pres").click(function(){
            $("#panel_info").animate({ 
                      width: "toggle"
               });
           $("#boton_pres").hide();
      });

           $("#diccionario").click(function(){
            $("#diccdatos").animate({ 
                      width: "show"
               });
           $("#panel_info").hide();
      });

                 $("#cerrar_dicc").click(function(){
           $("#diccdatos").hide();
      });

$(document).ready(function(){
   $("#panel_capas").load('cont/capas.php');
  $("#text").load('cont/panel_info.php');
  $("#text_diccdatos").load('cont/diccionario_datos.php');

});
  </script>
